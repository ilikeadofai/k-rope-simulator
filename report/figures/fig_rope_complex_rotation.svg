<svg xmlns="http://www.w3.org/2000/svg" width="760" height="500" viewBox="0 0 760 500">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#111827"/>
  </marker>
  <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
  </marker>
  <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#dc2626"/>
  </marker>
  <style>
    .title { font: 700 22px 'Noto Sans CJK KR', 'Malgun Gothic', sans-serif; fill:#111827; }
    .label { font: 15px 'Noto Sans CJK KR', 'Malgun Gothic', sans-serif; fill:#111827; }
    .small { font: 13px 'Noto Sans CJK KR', 'Malgun Gothic', sans-serif; fill:#374151; }
    .math { font: 16px 'DejaVu Sans', 'Noto Sans CJK KR', sans-serif; fill:#111827; }
    .axis { stroke:#111827; stroke-width:1.5; marker-end:url(#arrow); }
    .grid { stroke:#e5e7eb; stroke-width:1; }
  </style>
</defs>
<rect width="100%" height="100%" fill="#ffffff"/>
<text x="30" y="42" class="title">RoPE 회전의 세 표현: 좌표평면 · 복소평면 · 행렬</text>
<circle cx="235" cy="265" r="135" fill="#f9fafb" stroke="#d1d5db"/>
<line x1="65" y1="265" x2="405" y2="265" class="axis"/>
<line x1="235" y1="435" x2="235" y2="95" class="axis"/>
<text x="412" y="270" class="small">Re</text><text x="223" y="88" class="small">Im</text>
<line x1="235" y1="265" x2="346.3" y2="220.0" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow-blue)"/>
<line x1="235" y1="265" x2="262.0" y2="148.1" stroke="#dc2626" stroke-width="4" marker-end="url(#arrow-red)"/>
<text x="354.3" y="228.0" class="label" fill="#2563eb">z=x+y√−1</text>
<text x="270.0" y="142.1" class="label" fill="#dc2626">z′</text>
<path d="M 299.9 238.8 A 70 70 0 0 0 250.7 196.8" fill="none" stroke="#111827" stroke-width="2"/>
<text x="301" y="193" class="math">α</text>
<rect x="430" y="88" width="300" height="330" rx="14" fill="#f9fafb" stroke="#d1d5db"/>
<text x="450" y="125" class="label">복소평면 표현</text>
<text x="450" y="155" class="math">z′ = z(cosα + √−1 sinα)</text>
<text x="450" y="183" class="math">= z e^^(α√−1)</text>
<text x="450" y="225" class="label">좌표평면 표현</text>
<text x="450" y="255" class="math">x′ = x cosα − y sinα</text>
<text x="450" y="283" class="math">y′ = x sinα + y cosα</text>
<text x="450" y="325" class="label">행렬 표현</text>
<text x="450" y="355" class="math">R(α) = [[cosα, −sinα], [sinα, cosα]]</text>
<text x="450" y="390" class="small">세 표현은 같은 2차원 회전을 나타낸다.</text>
</svg>
