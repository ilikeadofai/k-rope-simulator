<svg xmlns="http://www.w3.org/2000/svg" width="760" height="430" viewBox="0 0 760 430">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#111827"/>
  </marker>
  <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
  </marker>
  <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#dc2626"/>
  </marker>
  <style>
    .title { font: 700 22px 'Noto Sans CJK KR', 'Malgun Gothic', sans-serif; fill:#111827; }
    .label { font: 15px 'Noto Sans CJK KR', 'Malgun Gothic', sans-serif; fill:#111827; }
    .small { font: 13px 'Noto Sans CJK KR', 'Malgun Gothic', sans-serif; fill:#374151; }
    .math { font: 16px 'DejaVu Sans', 'Noto Sans CJK KR', sans-serif; fill:#111827; }
    .axis { stroke:#111827; stroke-width:1.5; marker-end:url(#arrow); }
    .grid { stroke:#e5e7eb; stroke-width:1; }
  </style>
</defs>
<rect width="100%" height="100%" fill="#ffffff"/>
<text x="30" y="42" class="title">RoPE 주파수 θ_t의 등비수열 구조</text>
<line x1="90" y1="340" x2="680" y2="340" class="axis"/>
<line x1="90" y1="340" x2="90" y2="65" class="axis"/>
<text x="690" y="345" class="small">t</text>
<text x="55" y="60" class="small">θ_t</text>
<line x1="140.0" y1="90.0" x2="208.6" y2="125.7" stroke="#2563eb" stroke-width="3"/>
<line x1="208.6" y1="125.7" x2="277.1" y2="161.4" stroke="#2563eb" stroke-width="3"/>
<line x1="277.1" y1="161.4" x2="345.7" y2="197.1" stroke="#2563eb" stroke-width="3"/>
<line x1="345.7" y1="197.1" x2="414.3" y2="232.9" stroke="#2563eb" stroke-width="3"/>
<line x1="414.3" y1="232.9" x2="482.9" y2="268.6" stroke="#2563eb" stroke-width="3"/>
<line x1="482.9" y1="268.6" x2="551.4" y2="304.3" stroke="#2563eb" stroke-width="3"/>
<line x1="551.4" y1="304.3" x2="620.0" y2="340.0" stroke="#2563eb" stroke-width="3"/>
<circle cx="140.0" cy="90.0" r="5" fill="#2563eb"/>
<text x="135.0" y="364" class="small">1</text>
<circle cx="208.6" cy="125.7" r="5" fill="#2563eb"/>
<text x="203.6" y="364" class="small">2</text>
<circle cx="277.1" cy="161.4" r="5" fill="#2563eb"/>
<text x="272.1" y="364" class="small">3</text>
<circle cx="345.7" cy="197.1" r="5" fill="#2563eb"/>
<text x="340.7" y="364" class="small">4</text>
<circle cx="414.3" cy="232.9" r="5" fill="#2563eb"/>
<text x="409.3" y="364" class="small">5</text>
<circle cx="482.9" cy="268.6" r="5" fill="#2563eb"/>
<text x="477.9" y="364" class="small">6</text>
<circle cx="551.4" cy="304.3" r="5" fill="#2563eb"/>
<text x="546.4" y="364" class="small">7</text>
<circle cx="620.0" cy="340.0" r="5" fill="#2563eb"/>
<text x="615.0" y="364" class="small">8</text>
<rect x="435" y="92" width="290" height="160" rx="14" fill="#f9fafb" stroke="#d1d5db"/>
<text x="455" y="126" class="math">θ_t = 10000^{-2(t-1)/d}</text>
<text x="455" y="160" class="math">θ_{t+1}/θ_t = 10000^{-2/d}</text>
<text x="455" y="202" class="small">t가 1씩 증가할 때 비율이 일정하므로</text>
<text x="455" y="228" class="small">θ_t는 등비수열 구조를 가진다.</text>
<text x="75" y="390" class="small">그래프는 값의 차이를 보기 쉽게 log10(θ_t) 축으로 표현하였다.</text>
</svg>
