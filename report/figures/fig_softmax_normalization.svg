<svg xmlns="http://www.w3.org/2000/svg" width="760" height="430" viewBox="0 0 760 430">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#111827"/>
  </marker>
  <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
  </marker>
  <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#dc2626"/>
  </marker>
  <style>
    .title { font: 700 22px 'Noto Sans CJK KR', 'Malgun Gothic', sans-serif; fill:#111827; }
    .label { font: 15px 'Noto Sans CJK KR', 'Malgun Gothic', sans-serif; fill:#111827; }
    .small { font: 13px 'Noto Sans CJK KR', 'Malgun Gothic', sans-serif; fill:#374151; }
    .math { font: 16px 'DejaVu Sans', 'Noto Sans CJK KR', sans-serif; fill:#111827; }
    .axis { stroke:#111827; stroke-width:1.5; marker-end:url(#arrow); }
    .grid { stroke:#e5e7eb; stroke-width:1; }
  </style>
</defs>
<rect width="100%" height="100%" fill="#ffffff"/>
<text x="30" y="42" class="title">Softmax 정규화: 점수를 합이 1인 참고 비율로 바꾸기</text>
<text x="75" y="82" class="label">원래 점수 x</text>
<rect x="85" y="165" width="70" height="165" fill="#93c5fd" stroke="#1d4ed8"/>
<text x="110" y="354" class="label">x1</text>
<text x="112" y="155" class="math">2</text>
<rect x="185" y="220" width="70" height="110" fill="#93c5fd" stroke="#1d4ed8"/>
<text x="210" y="354" class="label">x2</text>
<text x="212" y="210" class="math">1</text>
<rect x="285" y="275" width="70" height="55" fill="#93c5fd" stroke="#1d4ed8"/>
<text x="310" y="354" class="label">x3</text>
<text x="312" y="265" class="math">0</text>
<line x1="55" y1="330" x2="385" y2="330" class="axis"/>
<path d="M 378 210 C 430 210, 430 210, 482 210" fill="none" stroke="#111827" stroke-width="2" marker-end="url(#arrow)"/>
<text x="390" y="190" class="small">e^x 적용 후</text>
<text x="390" y="245" class="small">전체 합으로 나눔</text>
<text x="505" y="82" class="label">softmax 결과 p</text>
<rect x="520" y="157.0" width="70" height="173.0" fill="#86efac" stroke="#15803d"/>
<text x="545" y="354" class="label">p1</text>
<text x="534" y="147.0" class="math">0.67</text>
<rect x="620" y="266.4" width="70" height="63.6" fill="#86efac" stroke="#15803d"/>
<text x="645" y="354" class="label">p2</text>
<text x="634" y="256.4" class="math">0.24</text>
<rect x="720" y="306.6" width="70" height="23.4" fill="#86efac" stroke="#15803d"/>
<text x="745" y="354" class="label">p3</text>
<text x="734" y="296.6" class="math">0.09</text>
<line x1="490" y1="330" x2="735" y2="330" class="axis"/>
<text x="45" y="390" class="math">softmax(x_i)= e^{x_i} / Σ_j e^{x_j}</text>
<text x="400" y="390" class="small">예: [2,1,0] → [0.67,0.24,0.09], 합은 1</text>
</svg>
