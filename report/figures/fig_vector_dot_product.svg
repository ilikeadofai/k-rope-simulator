<svg xmlns="http://www.w3.org/2000/svg" width="760" height="460" viewBox="0 0 760 460">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#111827"/>
  </marker>
  <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
  </marker>
  <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#dc2626"/>
  </marker>
  <style>
    .title { font: 700 22px 'Noto Sans CJK KR', 'Malgun Gothic', sans-serif; fill:#111827; }
    .label { font: 15px 'Noto Sans CJK KR', 'Malgun Gothic', sans-serif; fill:#111827; }
    .small { font: 13px 'Noto Sans CJK KR', 'Malgun Gothic', sans-serif; fill:#374151; }
    .math { font: 16px 'DejaVu Sans', 'Noto Sans CJK KR', sans-serif; fill:#111827; }
    .axis { stroke:#111827; stroke-width:1.5; marker-end:url(#arrow); }
    .grid { stroke:#e5e7eb; stroke-width:1; }
  </style>
</defs>
<rect width="100%" height="100%" fill="#ffffff"/>
<text x="30" y="42" class="title">벡터의 내적: 방향 유사성을 하나의 수로 나타내기</text>
<line x1="150" y1="80" x2="150" y2="370" class="grid"/>
<line x1="205" y1="80" x2="205" y2="370" class="grid"/>
<line x1="260" y1="80" x2="260" y2="370" class="grid"/>
<line x1="315" y1="80" x2="315" y2="370" class="grid"/>
<line x1="370" y1="80" x2="370" y2="370" class="grid"/>
<line x1="425" y1="80" x2="425" y2="370" class="grid"/>
<line x1="480" y1="80" x2="480" y2="370" class="grid"/>
<line x1="70" y1="340" x2="520" y2="340" class="grid"/>
<line x1="70" y1="285" x2="520" y2="285" class="grid"/>
<line x1="70" y1="230" x2="520" y2="230" class="grid"/>
<line x1="70" y1="175" x2="520" y2="175" class="grid"/>
<line x1="70" y1="120" x2="520" y2="120" class="grid"/>
<line x1="70" y1="65" x2="520" y2="65" class="grid"/>
<line x1="70" y1="340" x2="545" y2="340" class="axis"/>
<line x1="150" y1="390" x2="150" y2="70" class="axis"/>
<text x="548" y="345" class="small">x</text><text x="135" y="68" class="small">y</text>
<line x1="150" y1="340" x2="315" y2="230" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow-blue)"/>
<line x1="150" y1="340" x2="370" y2="285" stroke="#dc2626" stroke-width="4" marker-end="url(#arrow-red)"/>
<text x="323" y="222" class="label" fill="#2563eb">A=[3,2]</text>
<text x="378" y="290" class="label" fill="#dc2626">B=[4,1]</text>
<path d="M 198.5 327.9 A 50 50 0 0 0 191.6 312.3" fill="none" stroke="#111827" stroke-width="2"/>
<text x="206" y="302" class="math">β≈19.7°</text>
<line x1="315" y1="230" x2="331.17647058823525" y2="294.70588235294116" stroke="#6b7280" stroke-width="2" stroke-dasharray="6 5"/>
<circle cx="331.17647058823525" cy="294.70588235294116" r="4" fill="#6b7280"/>
<text x="445" y="118" class="label">계산</text>
<text x="445" y="150" class="math">A·B = 3×4 + 2×1 = 14</text>
<text x="445" y="182" class="math">|A| = √(3²+2²), |B| = √(4²+1²)</text>
<text x="445" y="214" class="math">A·B = |A||B|cosβ</text>
<text x="445" y="258" class="small">내적이 클수록 두 벡터의 방향이 더 비슷하다고 해석할 수 있다.</text>
<text x="445" y="286" class="small">Self-attention에서는 query와 key의 내적이 attention score가 된다.</text>
</svg>
